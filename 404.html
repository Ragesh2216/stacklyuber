<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Stackly</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-404-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-top: var(--header-height);
            text-align: center;
        }

        .page-404-inner {
            max-width: 500px;
            width: 100%;
        }

        .page-404-code {
            font-size: clamp(5rem, 20vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 16px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .float-icon {
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }
    </style>
</head>

<body class="page-404">
    <!-- Full Standard Navbar -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.webp" alt="Stackly Logo" style="height: 32px; width: auto;">
            </a>
            <nav class="nav-menu">
                <div class="dropdown">
                    <button class="nav-link dropdown-btn">Home
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="dropdown-content">
                        <a href="home2.html">Home 2</a>
                    </div>
                </div>
                <a href="services.html" class="nav-link">Services</a>
                <a href="about.html" class="nav-link">About Us</a>
                <a href="related.html" class="nav-link">Related</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="nav-link">Log in</a>
                <a href="login.html" class="btn btn-primary">Sign up</a>
            </div>
            <button class="mobile-menu-btn" aria-label="Toggle Navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay">
        <nav class="mobile-nav-list">
            <button class="mobile-dropdown-btn" onclick="this.nextElementSibling.classList.toggle('show')">Home
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="mobile-dropdown-content">
                <a href="home2.html">Home 2</a>
            </div>
            <a href="services.html" class="mobile-nav-link">Services</a>
            <a href="about.html" class="mobile-nav-link">About Us</a>
            <a href="related.html" class="mobile-nav-link">Related</a>
            <a href="contact.html" class="mobile-nav-link">Contact</a>
        </nav>
        <div class="mobile-actions">
            <a href="login.html" class="btn btn-secondary" style="width: 100%;">Log in</a>
            <a href="login.html" class="btn btn-primary" style="width: 100%;">Sign up</a>
        </div>
    </div>

    <!-- 404 Content — centered in remaining space -->
    <main class="page-404-content">
        <div class="page-404-inner">
            <div class="float-icon">
                <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"
                    style="color: var(--color-accent); margin-bottom: 24px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <div class="page-404-code">404</div>
            <h1 style="margin-bottom: 16px; font-size: 1.75rem;">This route doesn't exist yet</h1>
            <p class="text-lead" style="margin-bottom: 40px;">
                You've clicked on a mockup link. In a full application, this would take you to the requested feature or
                page.
            </p>
            <div class="flex items-center justify-center" style="gap: 16px; flex-wrap: wrap;">
                <button onclick="window.history.back()" class="btn btn-secondary">&#8592; Go back</button>
                <a href="index.html" class="btn btn-primary">Return Home</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
